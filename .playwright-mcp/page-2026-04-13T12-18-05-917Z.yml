      - generic "2026 FIFA World Cup squads" [ref=e184]:
        - generic [ref=e186]: From Wikipedia, the free encyclopedia
        - generic [ref=e188]:
          - paragraph [ref=e189]:
            - text: The
            - link "2026 FIFA World Cup" [ref=e190] [cursor=pointer]:
              - /url: /wiki/2026_FIFA_World_Cup
            - text: is an international
            - link "football" [ref=e191] [cursor=pointer]:
              - /url: /wiki/Association_football
            - text: tournament will be held in Canada, Mexico, and United States, from 11 June to 19 July 2026. The 48 national teams involved in the tournament will be required to register a squad of up to 26 players, including three goalkeepers. Only players in these squads will eligible to take part in the tournament.
            - superscript [ref=e192]:
              - link "[1]" [ref=e193] [cursor=pointer]:
                - /url: "#cite_note-regulations-1"
          - paragraph [ref=e194]:
            - text: A provisional release list of between 35 and 55 players per national team will be submitted to FIFA by 11 May 2026, one month prior to the opening match of the tournament. The release lists will be not made public by FIFA. From the preliminary squad, the final list of at most 26 and at least 23 players per national team will be submitted to FIFA by 1 June, ten days prior to the opening match of the tournament.
            - superscript [ref=e195]:
              - link "[2]" [ref=e196] [cursor=pointer]:
                - /url: "#cite_note-2"
            - text: In the event that a player on the submitted squad list suffered from an injury or illness prior to his team's first match of the tournament, that player could be replaced at any time up to 24 hours before their first match. The team doctor and the FIFA General Medical Officer had to both confirm that the injury or illness was severe enough to prevent the player from participating in the tournament. Replacement players did not need to be limited to the preliminary list.
            - superscript [ref=e197]:
              - link "[1]" [ref=e198] [cursor=pointer]:
                - /url: "#cite_note-regulations-1"
          - paragraph [ref=e199]:
            - text: The position listed for each player is per the official squad list published by FIFA. The age listed for each player is as of 11 June 2026, the first day of the tournament. The numbers of
            - link "caps" [ref=e200] [cursor=pointer]:
              - /url: /wiki/Cap_(sport)
            - text: and goals listed for each player do not include any matches played after the start of the tournament. The club listed is the club for which the player last played a competitive match prior to the tournament.
            - superscript [ref=e201]:
              - link "[note 1]" [ref=e202] [cursor=pointer]:
                - /url: "#cite_note-3"
            - text: The nationality for each club reflects the national association (not the league) to which the club is affiliated. A flag is included for coaches who are of a different nationality to their team.
